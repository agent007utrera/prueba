<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PC FÚTBOL 2026 - Liga 8 Equipos (Cloud Sync Ready)</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --pc-blue-dark: #001a33;
            --pc-blue-mid: #003366;
            --pc-blue-light: #5a8cb8;
            --pc-gold: #ffd700;
            --pc-text: #e6f0fa;
            --pc-success: #28a745;
        }

        body {
            background-color: #000;
            color: var(--pc-text);
            font-family: 'Verdana', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 20px;
            width: 1250px;
            max-width: 95vw;
        }

        .fixtures-panel, .table-panel {
            background: linear-gradient(180deg, var(--pc-blue-mid), var(--pc-blue-dark));
            border: 2px solid var(--pc-blue-light);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .fixtures-panel { flex: 1; }
        .table-panel { flex: 1.6; }

        h2 {
            color: var(--pc-gold);
            text-transform: uppercase;
            font-size: 18px;
            border-bottom: 1px solid var(--pc-blue-light);
            padding-bottom: 10px;
            margin-top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* --- BOTONES MODERNOS --- */
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }

        .btn-action {
            color: white;
            border: 1px solid white;
            font-size: 10px;
            padding: 8px 12px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 4px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-auto-save { background: #004d40; border-color: #00bfa5; }
        .btn-auto-load { background: #311b92; border-color: #7c4dff; }
        .btn-reset { background: #b71c1c; border-color: #ff5252; }

        .status-badge {
            font-size: 9px;
            padding: 2px 6px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            color: var(--pc-success);
            margin-left: 10px;
        }

        .jornada-selector {
            margin-bottom: 15px;
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        select {
            background: var(--pc-blue-dark);
            color: white;
            border: 1px solid var(--pc-blue-light);
            padding: 6px;
            font-weight: bold;
        }

        /* --- FILAS DE PARTIDOS --- */
        .match-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            margin-bottom: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            border-left: 3px solid transparent;
        }
        .match-row:hover { background: rgba(255,255,255,0.1); }
        .match-row.has-score { border-left-color: var(--pc-gold); }

        .score-input {
            width: 45px;
            height: 35px;
            font-size: 20px;
            text-align: center;
            font-weight: bold;
            border: 2px solid var(--pc-blue-light);
            border-radius: 4px;
            background: #fff;
            color: #000;
        }

        /* --- CLASIFICACIÓN --- */
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--pc-blue-dark); color: var(--pc-gold); padding: 12px 5px; border-bottom: 2px solid var(--pc-blue-light); }
        td { padding: 10px 5px; text-align: center; border-bottom: 1px solid rgba(90, 140, 184, 0.2); }
        .pos-1 { background: rgba(255, 215, 0, 0.1); color: var(--pc-gold); font-weight: bold; }
        .td-pts { font-size: 16px; color: var(--pc-gold); font-weight: bold; }

    </style>
</head>
<body>

<div class="container">
    <div class="fixtures-panel">
        <h2>CENTRAL DE DATOS <span id="saveStatus" class="status-badge">Sincronizado</span></h2>
        
        <div class="btn-group">
            <button class="btn-action btn-auto-save" onclick="exportarCodigo()">
                <i class="fas fa-copy"></i> CÓDIGO NUBE
            </button>
            <button class="btn-action btn-auto-load" onclick="importarCodigo()">
                <i class="fas fa-upload"></i> CARGAR NUBE
            </button>
            <a href="https://docs.google.com/document/d/1LuO4fxi0QphqnF06ka_F9b65K0jcuyK5/edit" 
               target="_blank" class="btn-action" style="background: #2b5797; text-decoration:none;">
               <i class="fas fa-file-alt"></i> ABRIR DOCS
            </a>
        </div>

        <div class="jornada-selector">
            <div>
                Jornada: <select id="jornadaSelect" onchange="renderMatches()"></select>
            </div>
            <button class="btn-action btn-reset" onclick="resetLiga()">REINICIAR LIGA</button>
        </div>
        
        <div id="matchesContainer"></div>
    </div>

    <div class="table-panel">
        <h2>CLASIFICACIÓN GENERAL</h2>
        <table>
            <thead>
                <tr>
                    <th>POS</th>
                    <th style="text-align:left; padding-left:10px;">EQUIPO</th>
                    <th>PJ</th><th>PG</th><th>PE</th><th>PP</th><th>GF</th><th>GC</th><th>DG</th><th>PTS</th>
                </tr>
            </thead>
            <tbody id="leagueTable"></tbody>
        </table>
    </div>
</div>

<script id="dataScript">
    const equiposArr = ["E1", "E2", "E3", "E4", "E5", "E6", "E7", "E8"];
    let leagueData = { 
        matches: [
            [["E4","E1"], ["E6","E7"], ["E5","E2"], ["E8","E3"]], 
            [["E6","E5"], ["E7","E3"], ["E1","E8"], ["E2","E4"]], 
            [["E8","E7"], ["E1","E2"], ["E5","E3"], ["E4","E6"]], 
            [["E2","E8"], ["E3","E4"], ["E6","E1"], ["E7","E5"]], 
            [["E1","E3"], ["E4","E7"], ["E2","E6"], ["E5","E8"]], 
            [["E3","E2"], ["E8","E6"], ["E5","E4"], ["E7","E1"]], 
            [["E4","E8"], ["E6","E3"], ["E2","E7"], ["E1","E5"]], 
            [["E1","E4"], ["E7","E6"], ["E2","E5"], ["E3","E8"]], 
            [["E5","E6"], ["E3","E7"], ["E8","E1"], ["E4","E2"]], 
            [["E7","E8"], ["E2","E1"], ["E3","E5"], ["E6","E4"]], 
            [["E8","E2"], ["E4","E3"], ["E1","E6"], ["E5","E7"]], 
            [["E3","E1"], ["E7","E4"], ["E6","E2"], ["E8","E5"]], 
            [["E2","E3"], ["E6","E8"], ["E4","E5"], ["E1","E7"]], 
            [["E8","E4"], ["E3","E6"], ["E7","E2"], ["E5","E1"]]  
        ].map(j => j.map(m => ({ home: m[0], away: m[1], gH: null, gA: null }))),
        teams: {}
    };

    // --- LÓGICA DE PERSISTENCIA ---

    function updateStatus(text, color) {
        const el = document.getElementById('saveStatus');
        el.innerText = text;
        el.style.color = color || 'var(--pc-success)';
    }

    function saveToLocal() {
        localStorage.setItem('pcfutbol_2026_autosave', JSON.stringify(leagueData.matches));
        updateStatus("Guardado Local OK");
    }

    function exportarCodigo() {
        const codigo = btoa(JSON.stringify(leagueData.matches));
        navigator.clipboard.writeText(codigo).then(() => {
            alert("¡Código copiado! Pégalo en tu Google Doc para 'Guardado Online'.");
            updateStatus("Código Copiado");
        });
    }

    function importarCodigo() {
        const codigo = prompt("Pega el código de tu Google Doc:");
        if (codigo) {
            try {
                leagueData.matches = JSON.parse(atob(codigo));
                saveToLocal(); calculateTable(); renderMatches();
                alert("Partida cargada.");
            } catch (e) { alert("Error al cargar."); }
        }
    }

    // --- CÁLCULOS DE LIGA ---

    function updateScore(j, m, s, v) {
        const n = v === "" ? null : parseInt(v);
        if (s === 'H') leagueData.matches[j][m].gH = n; else leagueData.matches[j][m].gA = n;
        
        updateStatus("Guardando...", "#ff9800");
        saveToLocal();
        calculateTable();
        setTimeout(() => updateStatus("Sincronizado"), 1000);
    }

    function calculateTable() {
        equiposArr.forEach(id => leagueData.teams[id] = { pj:0, pg:0, pe:0, pp:0, gf:0, gc:0, pts:0 });
        leagueData.matches.forEach(j => j.forEach(m => {
            if (m.gH !== null && m.gA !== null) {
                const h = leagueData.teams[m.home], a = leagueData.teams[m.away];
                h.pj++; a.pj++; h.gf += m.gH; h.gc += m.gA; a.gf += m.gA; a.gc += m.gH;
                if (m.gH > m.gA) { h.pg++; h.pts += 3; a.pp++; }
                else if (m.gA > m.gH) { a.pg++; a.pts += 3; h.pp++; }
                else { h.pe++; a.pe++; h.pts += 1; a.pts += 1; }
            }
        }));
        renderTable();
    }

    function renderMatches() {
        const jIdx = document.getElementById('jornadaSelect').value - 1;
        const container = document.getElementById('matchesContainer');
        container.innerHTML = '';
        leagueData.matches[jIdx].forEach((m, mIdx) => {
            const hasVal = m.gH !== null && m.gA !== null;
            container.innerHTML += `
                <div class="match-row ${hasVal ? 'has-score' : ''}">
                    <span style="width:100px; text-align:right; font-weight:bold;">${m.home}</span>
                    <input type="number" class="score-input" value="${m.gH !== null ? m.gH : ''}" onchange="updateScore(${jIdx},${mIdx},'H',this.value)">
                    <span style="color:var(--pc-gold); font-weight:bold;">VS</span>
                    <input type="number" class="score-input" value="${m.gA !== null ? m.gA : ''}" onchange="updateScore(${jIdx},${mIdx},'A',this.value)">
                    <span style="width:100px; text-align:left; font-weight:bold;">${m.away}</span>
                </div>`;
        });
    }

    function renderTable() {
        const tbody = document.getElementById('leagueTable');
        const sorted = Object.keys(leagueData.teams).sort((a,b) => {
            const tA = leagueData.teams[a], tB = leagueData.teams[b];
            return tB.pts - tA.pts || (tB.gf - tB.gc) - (tA.gf - tA.gc);
        });
        tbody.innerHTML = '';
        sorted.forEach((id, i) => {
            const t = leagueData.teams[id];
            tbody.innerHTML += `<tr class="${i===0?'pos-1':''}">
                <td>${i+1}</td><td style="text-align:left; padding-left:15px">${id}</td>
                <td>${t.pj}</td><td>${t.pg}</td><td>${t.pe}</td><td>${t.pp}</td>
                <td>${t.gf}</td><td>${t.gc}</td><td>${t.gf-t.gc}</td><td class="td-pts">${t.pts}</td>
            </tr>`;
        });
    }

    function resetLiga() { if (confirm("¿Seguro que quieres borrar toda la temporada?")) { localStorage.clear(); location.reload(); } }

    window.onload = () => {
        const sel = document.getElementById('jornadaSelect');
        for(let i=1; i<=14; i++) sel.innerHTML += `<option value="${i}">Jornada ${i}</option>`;
        
        // Carga automática desde LocalStorage al abrir
        const saved = localStorage.getItem('pcfutbol_2026_autosave');
        if(saved) {
            leagueData.matches = JSON.parse(saved);
            updateStatus("Partida Cargada");
        }

        calculateTable(); 
        renderMatches();
    };
</script>
</body>
</html>
