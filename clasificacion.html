<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PC FÚTBOL 2026 - Liga 8 Equipos</title>
    <style>
        :root {
            --pc-blue-dark: #001a33;
            --pc-blue-mid: #003366;
            --pc-blue-light: #5a8cb8;
            --pc-gold: #ffd700;
            --pc-text: #e6f0fa;
            --pc-cyan: #00ffff;
        }

        body {
            background-color: #000;
            color: var(--pc-text);
            font-family: 'Verdana', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 20px;
            width: 1250px;
            max-width: 95vw;
        }

        .fixtures-panel, .table-panel {
            background: linear-gradient(180deg, var(--pc-blue-mid), var(--pc-blue-dark));
            border: 2px solid var(--pc-blue-light);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .fixtures-panel { flex: 1; }
        .table-panel { flex: 1.6; }

        h2 {
            color: var(--pc-gold);
            text-transform: uppercase;
            font-size: 18px;
            border-bottom: 1px solid var(--pc-blue-light);
            padding-bottom: 10px;
            margin-top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; }

        .btn-action {
            color: white;
            border: 1px solid white;
            font-size: 9px;
            padding: 6px 10px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn-reset { background: #a00; }
        .btn-save-file { background: #080; }
        .btn-cloud { background: #0066ff; }

        /* Botón SAVEGAME Especial */
        .btn-link.btn-web {
            background: linear-gradient(180deg, #004444 0%, #008b8b 100%);
            color: var(--pc-gold);
            border: 2px solid var(--pc-gold);
            font-size: 11px;
            margin-top: 10px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            transition: 0.3s;
        }
        
        .btn-link.btn-web:hover {
            background: var(--pc-gold);
            color: #000;
            box-shadow: 0 0 20px var(--pc-gold);
        }

        .jornada-selector {
            margin-bottom: 15px;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 4px;
        }

        select {
            background: var(--pc-blue-dark);
            color: white;
            border: 1px solid var(--pc-blue-light);
            padding: 5px;
        }

        .match-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            margin-bottom: 5px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }

        .score-input {
            width: 40px;
            height: 30px;
            font-size: 18px;
            text-align: center;
            font-weight: bold;
            border: 2px solid var(--pc-blue-light);
            border-radius: 4px;
        }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: var(--pc-blue-dark); color: var(--pc-gold); padding: 12px 5px; border-bottom: 2px solid var(--pc-blue-light); }
        td { padding: 10px 5px; text-align: center; border-bottom: 1px solid rgba(90, 140, 184, 0.2); }
        .pos-1 { background: rgba(255, 215, 0, 0.15); color: var(--pc-gold); }
    </style>
</head>
<body>

<div class="container">
    <div class="fixtures-panel">
        <h2>GESTIÓN DE PARTIDOS</h2>
        
        <div class="btn-group">
            <button class="btn-action btn-cloud" onclick="exportarCodigo()">Generar Código</button>
            <button class="btn-action btn-cloud" onclick="importarCodigo()">Cargar Código</button>
            <button class="btn-action btn-save-file" onclick="exportarHTML()">Exportar HTML</button>
        </div>

        <a href="https://docs.google.com/document/d/1LuO4fxi0QphqnF06ka_F9b65K0jcuyK5/edit?usp=drive_link&ouid=114449747404473684266&rtpof=true&sd=true" 
           target="_blank" class="btn-action btn-link btn-web">
           <i class="fas fa-cloud"></i> IR A MI NUBE (SAVEGAME)
        </a>

        <hr style="border: 0; border-top: 1px solid var(--pc-blue-light); margin: 20px 0;">

        <div class="jornada-selector">
            Jornada: <select id="jornadaSelect" onchange="renderMatches()"></select>
            <button class="btn-action btn-reset" style="float:right" onclick="resetLiga()">Reset</button>
        </div>
        
        <div id="matchesContainer"></div>
    </div>

    <div class="table-panel">
        <h2>CLASIFICACIÓN LIGA 2026</h2>
        <table>
            <thead>
                <tr>
                    <th>POS</th>
                    <th style="text-align:left; padding-left:10px;">EQUIPO</th>
                    <th>PJ</th><th>PG</th><th>PE</th><th>PP</th><th>GF</th><th>GC</th><th>DG</th><th>PTS</th>
                </tr>
            </thead>
            <tbody id="leagueTable"></tbody>
        </table>
    </div>
</div>

<script id="dataScript">
    const equiposArr = ["E1", "E2", "E3", "E4", "E5", "E6", "E7", "E8"];
    let leagueData = { 
        matches: [
            [["E4","E1"], ["E6","E7"], ["E5","E2"], ["E8","E3"]], 
            [["E6","E5"], ["E7","E3"], ["E1","E8"], ["E2","E4"]], 
            [["E8","E7"], ["E1","E2"], ["E5","E3"], ["E4","E6"]], 
            [["E2","E8"], ["E3","E4"], ["E6","E1"], ["E7","E5"]], 
            [["E1","E3"], ["E4","E7"], ["E2","E6"], ["E5","E8"]], 
            [["E3","E2"], ["E8","E6"], ["E5","E4"], ["E7","E1"]], 
            [["E4","E8"], ["E6","E3"], ["E2","E7"], ["E1","E5"]], 
            [["E1","E4"], ["E7","E6"], ["E2","E5"], ["E3","E8"]], 
            [["E5","E6"], ["E3","E7"], ["E8","E1"], ["E4","E2"]], 
            [["E7","E8"], ["E2","E1"], ["E3","E5"], ["E6","E4"]], 
            [["E8","E2"], ["E4","E3"], ["E1","E6"], ["E5","E7"]], 
            [["E3","E1"], ["E7","E4"], ["E6","E2"], ["E8","E5"]], 
            [["E2","E3"], ["E6","E8"], ["E4","E5"], ["E1","E7"]], 
            [["E8","E4"], ["E3","E6"], ["E7","E2"], ["E5","E1"]]  
        ].map(j => j.map(m => ({ home: m[0], away: m[1], gH: null, gA: null }))),
        teams: {}
    };

    function exportarCodigo() {
        const codigo = btoa(JSON.stringify(leagueData.matches));
        const tempInput = document.createElement("textarea");
        document.body.appendChild(tempInput);
        tempInput.value = codigo;
        tempInput.select();
        document.execCommand("copy");
        document.body.removeChild(tempInput);
        alert("¡Código copiado al portapapeles! Ahora pégalo en tu Google Doc.");
    }

    function importarCodigo() {
        const codigo = prompt("Pega aquí el código que tienes guardado en tu Google Doc:");
        if (codigo) {
            try {
                leagueData.matches = JSON.parse(atob(codigo));
                saveLocal(); calculateTable(); renderMatches();
                alert("Partida cargada correctamente.");
            } catch (e) { alert("Código no válido."); }
        }
    }

    function saveLocal() { localStorage.setItem('pc_save_v2', JSON.stringify(leagueData.matches)); }

    function exportarHTML() {
        const scriptActual = document.getElementById('dataScript').innerHTML;
        const dataInyectada = scriptActual.replace(/let leagueData = \{[\s\S]*?\};/, `let leagueData = ${JSON.stringify(leagueData, null, 2)};`);
        const htmlCompleto = `<!DOCTYPE html>\n${document.documentElement.outerHTML.replace(scriptActual, dataInyectada)}`;
        const blob = new Blob([htmlCompleto], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'PC_Futbol_Partida.html';
        a.click();
    }

    function updateScore(j, m, s, v) {
        const n = v === "" ? null : parseInt(v);
        if (s === 'H') leagueData.matches[j][m].gH = n; else leagueData.matches[j][m].gA = n;
        saveLocal(); calculateTable();
    }

    function calculateTable() {
        equiposArr.forEach(id => leagueData.teams[id] = { pj:0, pg:0, pe:0, pp:0, gf:0, gc:0, pts:0 });
        leagueData.matches.forEach(j => j.forEach(m => {
            if (m.gH !== null && m.gA !== null) {
                const h = leagueData.teams[m.home], a = leagueData.teams[m.away];
                h.pj++; a.pj++; h.gf += m.gH; h.gc += m.gA; a.gf += m.gA; a.gc += m.gH;
                if (m.gH > m.gA) { h.pg++; h.pts += 3; a.pp++; }
                else if (m.gA > m.gH) { a.pg++; a.pts += 3; h.pp++; }
                else { h.pe++; a.pe++; h.pts += 1; a.pts += 1; }
            }
        }));
        renderTable();
    }

    function renderMatches() {
        const jIdx = document.getElementById('jornadaSelect').value - 1;
        const container = document.getElementById('matchesContainer');
        container.innerHTML = '';
        leagueData.matches[jIdx].forEach((m, mIdx) => {
            container.innerHTML += `
                <div class="match-row">
                    <span style="width:80px; text-align:right">${m.home}</span>
                    <input type="number" class="score-input" value="${m.gH !== null ? m.gH : ''}" onchange="updateScore(${jIdx},${mIdx},'H',this.value)">
                    <span>vs</span>
                    <input type="number" class="score-input" value="${m.gA !== null ? m.gA : ''}" onchange="updateScore(${jIdx},${mIdx},'A',this.value)">
                    <span style="width:80px; text-align:left">${m.away}</span>
                </div>`;
        });
    }

    function renderTable() {
        const tbody = document.getElementById('leagueTable');
        const sorted = Object.keys(leagueData.teams).sort((a,b) => {
            const tA = leagueData.teams[a], tB = leagueData.teams[b];
            return tB.pts - tA.pts || (tB.gf - tB.gc) - (tA.gf - tA.gc);
        });
        tbody.innerHTML = '';
        sorted.forEach((id, i) => {
            const t = leagueData.teams[id];
            tbody.innerHTML += `<tr class="${i===0?'pos-1':''}">
                <td>${i+1}</td><td style="text-align:left; padding-left:10px">${id}</td>
                <td>${t.pj}</td><td>${t.pg}</td><td>${t.pe}</td><td>${t.pp}</td>
                <td>${t.gf}</td><td>${t.gc}</td><td>${t.gf-t.gc}</td><td style="color:var(--pc-gold); font-weight:bold">${t.pts}</td>
            </tr>`;
        });
    }

    function resetLiga() { if (confirm("¿Borrar todo?")) { localStorage.clear(); location.reload(); } }

    window.onload = () => {
        const sel = document.getElementById('jornadaSelect');
        for(let i=1; i<=14; i++) sel.innerHTML += `<option value="${i}">Jornada ${i}</option>`;
        const saved = localStorage.getItem('pc_save_v2');
        if(saved) leagueData.matches = JSON.parse(saved);
        calculateTable(); renderMatches();
    };
</script>
</body>
</html>
