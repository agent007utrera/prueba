<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPERSOCCER 2026 - FINAL WHISTLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow:wght@400;700;900&display=swap');

        :root {
            --fc-green: #ccff00;
            --fc-blue: #00e5ff;
            --fc-pink: #ff007a;
            --dark-bg: #050d14;
        }

        body {
            font-family: 'Barlow', sans-serif;
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 10%, rgba(0, 229, 255, 0.1) 0%, transparent 50%);
            color: white; margin: 0; display: flex; flex-direction: column; align-items: center; text-transform: uppercase;
        }

        .container { width: 100%; max-width: 1000px; padding: 20px; box-sizing: border-box; }

        .header-panel { text-align: center; margin-bottom: 10px; }
        .phase-badge { color: var(--fc-green); letter-spacing: 3px; font-weight: 900; border-bottom: 2px solid var(--fc-green); display: inline-block; padding-bottom: 5px; }
        
        .duel-display { 
            font-size: 1.3rem; font-weight: 900; text-align: center; margin: 15px 0; 
            padding: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; color: var(--fc-blue);
            min-height: 1.5em;
        }

        .match-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; padding: 15px; display: grid; grid-template-columns: 1fr 70px 30px 70px 1fr 100px;
            align-items: center; gap: 10px; margin-bottom: 10px; transition: 0.3s;
        }

        @keyframes blinkAtk { 0% { opacity: 1; color: var(--fc-green); } 50% { opacity: 0.3; color: #fff; } 100% { opacity: 1; color: var(--fc-green); } }
        .is-attacking { animation: blinkAtk 0.8s infinite; font-weight: 900; }

        .score { font-size: 1.8rem; font-family: 'Archivo Black'; color: var(--fc-green); margin: 0 5px; }
        input { 
            background: black; color: white; border: 1px solid #444; padding: 8px; width: 50px; 
            text-align: center; font-size: 1.2rem; font-weight: 900; border-radius: 5px; 
        }
        input:disabled { opacity: 0.1; border: none; cursor: not-allowed; }
        
        .stat-box { font-size: 1.8rem; font-weight: 900; color: var(--fc-pink); text-align: center; margin: 15px; height: 40px; }
        
        .btn-action {
            background: #fff; color: #000; border: none; padding: 15px 40px; font-weight: 900; 
            cursor: pointer; clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%); transition: 0.3s;
        }
        .btn-action:hover:not(:disabled) { background: var(--fc-green); transform: scale(1.05); }
        .btn-action:disabled { opacity: 0.2; cursor: not-allowed; }

        /* Botón de Evento especial */
        #btnEventoFinal {
            background: var(--fc-green); color: black; display: none; margin: 20px auto;
            box-shadow: 0 0 20px rgba(204, 255, 0, 0.4);
        }

        .modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--dark-bg); z-index: 100; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        .event-card { background: rgba(255,255,255,0.05); border: 2px solid var(--fc-green); padding: 30px; border-radius: 20px; max-width: 500px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-panel">
            <div class="phase-badge" id="phaseNum">FASE 1 / 20</div>
            <div class="duel-display" id="duelTitle">PREPARANDO...</div>
        </div>

        <div class="stat-box" id="statDisplay">🎲 ESPERANDO</div>

        <div id="matchesContainer"></div>

        <div style="display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 20px;">
            <div style="display: flex; gap: 20px;">
                <button class="btn-action" id="btnSortear" onclick="sortearAtributo()">SORTEAR</button>
                <button class="btn-action" id="btnAccion" onclick="ejecutar()" disabled>LANZAR DADOS</button>
            </div>
            <button class="btn-action" id="btnEventoFinal" onclick="showFinalEvent()">FINALIZAR Y VER EVENTO</button>
        </div>
    </div>

    <div class="modal" id="modalFinal">
        <div class="event-card">
            <div id="evIcon" style="font-size: 3rem;">🎲</div>
            <h2 id="evTitle" style="color: var(--fc-green);">EVENTO DE LIGA</h2>
            <p id="evMsg" style="font-size: 1.2rem;"></p>
            <div id="penaltyZone" style="display: none; border-top: 1px solid #333; margin-top: 20px; padding-top: 20px;">
                <div id="penaltyResult" style="font-size: 1.5rem; font-weight: 900; margin-bottom: 15px;"></div>
                <button class="btn-action" id="btnShoot" onclick="shootPenalty()" style="background: var(--fc-pink); color: white;">LANZAR PENALTI</button>
            </div>
            <div style="margin-top: 30px; display: flex; gap: 10px; justify-content: center;">
                <button class="btn-action" id="btnNextJornada" onclick="location.reload()">SIGUIENTE JORNADA</button>
                <button class="btn-action" onclick="window.location.href='menu.html'" style="background: var(--fc-blue);">MENÚ</button>
            </div>
        </div>
    </div>

<script>
    const equipos = ["Equipo A", "Equipo B", "Equipo C", "Equipo D", "Equipo E", "Equipo F", "Equipo G", "Equipo H"];
    const teams = ["Real Betis", "Sevilla", "Real Madrid", "Barcelona", "Atlético", "Athletic", "Valencia", "Villarreal"];
    const posiciones = ["Portero", "Defensa", "Medio", "Delantero"];
    const atributos = ["RITMO ⚡", "TIRO ⚽", "PASE 🎯", "REGATE 🪄", "DEFENSA 🛡️", "FÍSICO 💪"];
    
    let faseIdx = 0;
    let equiposActivos = [true, true, true, true];
    let marcadores = [0,0,0,0,0,0,0,0];

    const sequence = [
        { name: "DEFENSA LOCAL vs DEFENSA VISITANTE", atk: "L" },
        { name: "DEFENSA LOCAL vs PORTERO VISITANTE", atk: "L", isGoalPhase: true },
        { name: "DEFENSA VISITANTE vs DEFENSA LOCAL", atk: "V" },
        { name: "DEFENSA VISITANTE vs PORTERO LOCAL", atk: "V", isGoalPhase: true },
        { name: "MEDIO IZQUIERDO LOCAL vs DEFENSA VISITANTE", atk: "L" },
        { name: "MEDIO IZQUIERDO LOCAL vs PORTERO VISITANTE", atk: "L", isGoalPhase: true },
        { name: "MEDIO IZQUIERDO VISITANTE vs DEFENSA LOCAL", atk: "V" },
        { name: "MEDIO IZQUIERDO VISITANTE vs PORTERO LOCAL", atk: "V", isGoalPhase: true },
        { name: "MEDIO DERECHO LOCAL vs DEFENSA VISITANTE", atk: "L" },
        { name: "MEDIO DERECHO LOCAL vs PORTERO VISITANTE", atk: "L", isGoalPhase: true },
        { name: "MEDIO DERECHO VISITANTE vs DEFENSA LOCAL", atk: "V" },
        { name: "MEDIO DERECHO VISITANTE vs PORTERO LOCAL", atk: "V", isGoalPhase: true },
        { name: "DELANTERO LOCAL vs DEFENSA VISITANTE", atk: "L" },
        { name: "DELANTERO LOCAL vs PORTERO VISITANTE", atk: "L", isGoalPhase: true },
        { name: "DELANTERO VISITANTE vs DEFENSA LOCAL", atk: "V" },
        { name: "DELANTERO VISITANTE vs PORTERO LOCAL", atk: "V", isGoalPhase: true },
        { name: "DELANTERO LOCAL vs DEFENSA VISITANTE", atk: "L" },
        { name: "DELANTERO LOCAL vs PORTERO VISITANTE", atk: "L", isGoalPhase: true },
        { name: "DELANTERO VISITANTE vs DEFENSA LOCAL", atk: "V" },
        { name: "DELANTERO VISITANTE vs PORTERO LOCAL", atk: "V", isGoalPhase: true }
    ];

    function renderMatches() {
        const container = document.getElementById('matchesContainer');
        container.innerHTML = '';
        const f = sequence[faseIdx];
        if (!f) return; // Fin de secuencia

        for(let i=0; i<4; i++) {
            const idL = i*2; const idV = i*2+1;
            const canPlay = equiposActivos[i];
            const blinkL = (canPlay && f.atk === "L") ? 'is-attacking' : '';
            const blinkV = (canPlay && f.atk === "V") ? 'is-attacking' : '';

            container.innerHTML += `
                <div class="match-card" style="opacity: ${canPlay ? 1 : 0.2}">
                    <div class="${blinkL}" style="text-align:right">${equipos[idL]} <span class="score">${marcadores[idL]}</span></div>
                    <input type="number" id="in-${idL}" ${!canPlay ? 'disabled' : ''} placeholder="0">
                    <div style="color:#444; font-weight:900; text-align:center">VS</div>
                    <input type="number" id="in-${idV}" ${!canPlay ? 'disabled' : ''} placeholder="0">
                    <div class="${blinkV}">${equipos[idV]} <span class="score">${marcadores[idV]}</span></div>
                    <div id="status-${i}" style="font-weight:700; font-size:0.7rem; text-align:center">---</div>
                </div>`;
        }
        document.getElementById('duelTitle').innerText = f.name;
        document.getElementById('phaseNum').innerText = `FASE ${faseIdx + 1} / ${sequence.length}`;
    }

    function sortearAtributo() {
        const atr = atributos[Math.floor(Math.random()*atributos.length)];
        document.getElementById('statDisplay').innerText = atr;
        document.getElementById('btnAccion').disabled = false;
        document.getElementById('btnSortear').disabled = true;
    }

    function ejecutar() {
        const f = sequence[faseIdx];
        if (!f.isGoalPhase) dueloCampo();
        else dueloPortero();
        
        document.getElementById('btnAccion').disabled = true;
        document.getElementById('btnSortear').disabled = false;
    }

    function dueloCampo() {
        const f = sequence[faseIdx];
        const nuevosActivos = [false, false, false, false];
        for(let i=0; i<4; i++) {
            let idA = (f.atk === "L") ? i*2 : i*2+1;
            let idD = (f.atk === "L") ? i*2+1 : i*2;
            let vA = parseInt(document.getElementById(`in-${idA}`).value) || 0;
            let vD = parseInt(document.getElementById(`in-${idD}`).value) || 0;
            if ( ((Math.floor(Math.random()*6)+1) * 10 ) + vA > ( (Math.floor(Math.random()*6)+1) * 10 ) + vD ) {
                nuevosActivos[i] = true;
                document.getElementById(`status-${i}`).innerText = "PASA A PORTERÍA";
                document.getElementById(`status-${i}`).style.color = "var(--fc-blue)";
            } else {
                document.getElementById(`status-${i}`).innerText = "BLOQUEADO";
                document.getElementById(`status-${i}`).style.color = "var(--fc-pink)";
            }
        }
        equiposActivos = nuevosActivos;
        avanzarFase();
    }

    function dueloPortero() {
        const f = sequence[faseIdx];
        for(let i=0; i<4; i++) {
            if(!equiposActivos[i]) continue;
            let idA = (f.atk === "L") ? i*2 : i*2+1;
            let idD = (f.atk === "L") ? i*2+1 : i*2;
            let vA = parseInt(document.getElementById(`in-${idA}`).value) || 0;
            let vP = parseInt(document.getElementById(`in-${idD}`).value) || 0;
            if ( ((Math.floor(Math.random()*6)+1) * 10 ) + vA > ( (Math.floor(Math.random()*6)+1) * 10 ) + vP ) {
                marcadores[idA]++;
                document.getElementById(`status-${i}`).innerText = "¡GOOOL!";
                document.getElementById(`status-${i}`).style.color = "var(--fc-green)";
            } else {
                document.getElementById(`status-${i}`).innerText = "PARADA";
            }
        }
        equiposActivos = [true, true, true, true];
        avanzarFase();
    }

    function avanzarFase() {
        faseIdx++;
        if(faseIdx >= sequence.length) {
            document.getElementById('duelTitle').innerText = "PARTIDOS FINALIZADOS";
            document.getElementById('phaseNum').innerText = "FIN";
            document.getElementById('btnSortear').style.display = 'none';
            document.getElementById('btnAccion').style.display = 'none';
            document.getElementById('btnEventoFinal').style.display = 'block';
            document.getElementById('statDisplay').innerText = "🏁 FIN DEL TIEMPO REGLAMENTARIO";
        } else {
            renderMatches();
            document.getElementById('statDisplay').innerText = "🎲 ESPERANDO";
        }
    }

    function getRand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function showFinalEvent() {
        document.getElementById('modalFinal').style.display = 'flex';
        const ev = Math.floor(Math.random() * 6) + 1;
        const equipo = getRand(teams);
        const pos = getRand(posiciones);
        let msg = "";
        switch(ev) {
            case 1: msg = `📺 VAR: SE ANULA EL ÚLTIMO GOL MARCADO POR EL <strong>${equipo}</strong>.`; break;
            case 2:
                const semanas = Math.floor(Math.random() * 6) + 1;
                msg = `🚑 LESIONADO EL <strong>${pos}</strong> DEL <strong>${equipo}</strong>. ESTARÁ <strong>${semanas}</strong> SEMANAS SIN JUGAR.`;
                break;
            case 3: msg = `🔴 EXPULSADO EL <strong>${pos}</strong> DEL <strong>${equipo}</strong>. ESTARÁ <strong>1 PARTIDO</strong> SIN JUGAR.`; break;
            case 4:
                msg = `🥅 PENALTI A FAVOR DEL <strong>${equipo}</strong>. CON 3, 4, 5 ó 6 ES GOL.`;
                document.getElementById('penaltyZone').style.display = 'block';
                document.getElementById('btnNextJornada').style.visibility = 'hidden';
                break;
            case 5: msg = `🏃 EL <strong>${pos}</strong> DEL <strong>${equipo}</strong> HA PAGADO SU CLÁUSULA Y SE HA MARCHADO A OTRO EQUIPO.`; break;
            case 6:
                const esMulta = Math.random() > 0.5;
                msg = esMulta ? `🏁 EL <strong>${equipo}</strong> HA SIDO MULTADO CON <strong>10 MILLONES</strong>.` : `🎫 EL <strong>${equipo}</strong> HA INGRESADO <strong>10 MILLONES</strong> POR PUBLICIDAD.`;
                break;
        }
        document.getElementById('evIcon').innerText = "🎲 " + ev;
        document.getElementById('evMsg').innerHTML = msg;
    }

    function shootPenalty() {
        const roll = Math.floor(Math.random() * 6) + 1;
        const resDiv = document.getElementById('penaltyResult');
        const isGoal = roll >= 3;
        if (isGoal) { new Audio('gol.mp3').play(); } else { new Audio('fallo.mp3').play(); }
        resDiv.innerText = `DADO: ${roll} -> ${isGoal ? "¡GOOOL!" : "¡FALLO!"}`;
        resDiv.style.color = isGoal ? "var(--fc-green)" : "var(--fc-pink)";
        document.getElementById('btnShoot').style.display = 'none';
        document.getElementById('btnNextJornada').style.visibility = 'visible';
    }

    renderMatches();
</script>
</body>
</html>
