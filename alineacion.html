<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC FÚTBOL 2026 - ALINEACIONES</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;700;900&display=swap');

        :root {
            --pc-gold: #ffd700;
            --pc-blue: #004a99;
            --dark-metal: #1a1a1a;
            --pitch-green: #1e4d20;
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: 'Barlow', sans-serif;
            background-color: #000;
            color: white;
            margin: 0;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow-x: auto; 
            overflow-y: hidden;
            text-transform: uppercase;
        }

        #sidebar {
            width: 240px;
            min-width: 240px;
            background: linear-gradient(180deg, #050505 0%, var(--dark-metal) 100%);
            border-right: 2px solid var(--pc-blue);
            padding: 20px;
            overflow-y: auto;
            height: 100vh;
            z-index: 20;
        }

        h2 { color: var(--pc-gold); font-size: 1rem; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .league-title { color: var(--pc-blue); font-weight: 900; margin-top: 15px; font-size: 0.75rem; letter-spacing: 1px; }
        
        .team-link {
            display: block;
            padding: 8px 10px;
            color: #888;
            text-decoration: none;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .team-link:hover {
            color: var(--pc-gold);
            background: rgba(255,255,255,0.05);
            padding-left: 15px;
        }

        #main-view {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #111 0%, #000 100%);
            padding: 20px;
            min-width: 850px; /* Límite mínimo para que no se rompa la interfaz */
        }

        #team-name-bg {
            font-size: 2.2rem;
            font-weight: 900;
            color: rgba(255,215,0,0.07);
            margin-bottom: 10px;
        }

        /* CAMPO MÁS COMPACTO Y PROPORCIONAL */
        #soccer-pitch {
            position: relative;
            width: 800px; /* Reducido de 950px a 800px */
            height: 480px; 
            background: var(--pitch-green);
            border: 4px solid white;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            background-image: 
                linear-gradient(90deg, transparent 49.8%, white 50%, white 50.2%, transparent 50.4%),
                repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(255,255,255,0.03) 80px, rgba(255,255,255,0.03) 160px);
            overflow: visible;
        }

        .area {
            position: absolute;
            top: 25%;
            height: 50%;
            width: 100px;
            border: 2px solid white;
            z-index: 1;
        }
        .area-izq { left: 0; border-left: none; }
        .area-der { right: 0; border-right: none; }

        .player-card {
            position: absolute;
            width: 90px;
            height: 125px;
            background: #222;
            border: 2px solid var(--pc-gold);
            border-radius: 5px;
            transform: translate(-50%, -50%);
            z-index: 10;
            cursor: zoom-in;
            box-shadow: 4px 8px 15px rgba(0,0,0,0.5);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            object-fit: cover;
        }

        .player-card:hover {
            transform: translate(-50%, -55%) scale(1.1);
            border-color: white;
            z-index: 15;
        }

        /* POSICIONAMIENTO EN PORCENTAJES PARA QUE SE AJUSTEN AL MINIMIZAR */
        .pos-por { left: 12%; top: 50%; }
        .pos-def { left: 35%; top: 50%; }
        .pos-medi { left: 58%; top: 28%; } 
        .pos-medd { left: 58%; top: 72%; } 
        .pos-del { left: 85%; top: 50%; }

        #bench-container {
            margin-top: 20px;
            width: 800px;
        }

        .bench-label {
            font-size: 0.65rem;
            color: var(--pc-gold);
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: 1px;
        }

        #bench-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #222;
        }

        .bench-card {
            width: 80px;
            height: 110px;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: zoom-in;
            transition: 0.3s;
            object-fit: cover;
        }

        .bench-card:hover {
            transform: translateY(-5px);
            border-color: var(--pc-gold);
        }

        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        #modal img {
            max-height: 85vh;
            border: 4px solid var(--pc-gold);
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>PC FÚTBOL 2026</h2>
        <div class="league-title">PREMIER LEAGUE</div>
        <a class="team-link" onclick="update('arsenal')">Arsenal</a>
        <a class="team-link" onclick="update('chelsea')">Chelsea</a>
        <a class="team-link" onclick="update('liverpool')">Liverpool</a>
        <a class="team-link" onclick="update('manchester_city')">Manchester City</a>
        <div class="league-title">BUNDESLIGA</div>
        <a class="team-link" onclick="update('bayern')">Bayern Munich</a>
        <a class="team-link" onclick="update('borussia')">Borussia Dortmund</a>
        <div class="league-title">LIGUE 1</div>
        <a class="team-link" onclick="update('psg')">PSG</a>
        <a class="team-link" onclick="update('monaco')">Monaco</a>
        <div class="league-title">SERIE A</div>
        <a class="team-link" onclick="update('inter')">Inter de Milán</a>
        <a class="team-link" onclick="update('juventus')">Juventus</a>
        <div class="league-title">LIGA ARGENTINA</div>
        <a class="team-link" onclick="update('boca')">Boca Juniors</a>
        <a class="team-link" onclick="update('river')">River Plate</a>
    </div>

    <div id="main-view">
        <div id="team-name-bg">PSG</div>
        
        <div id="soccer-pitch">
            <div class="area area-izq"></div>
            <div class="area area-der"></div>
            <img id="por" class="player-card pos-por" onclick="openZoom(this.src)">
            <img id="def" class="player-card pos-def" onclick="openZoom(this.src)">
            <img id="medi" class="player-card pos-medi" onclick="openZoom(this.src)">
            <img id="medd" class="player-card pos-medd" onclick="openZoom(this.src)">
            <img id="del" class="player-card pos-del" onclick="openZoom(this.src)">
        </div>

        <div id="bench-container">
            <div class="bench-label">SUPLENTES 1-5</div>
            <div id="bench-row">
                <img id="s1" class="bench-card" onclick="openZoom(this.src)">
                <img id="s2" class="bench-card" onclick="openZoom(this.src)">
                <img id="s3" class="bench-card" onclick="openZoom(this.src)">
                <img id="s4" class="bench-card" onclick="openZoom(this.src)">
                <img id="s5" class="bench-card" onclick="openZoom(this.src)">
            </div>
        </div>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <img id="imgZoom" src="">
    </div>

    <script>
        function update(team) {
            document.getElementById('team-name-bg').innerText = team.toUpperCase();
            document.getElementById('por').src = `images/${team}_por.jpg`;
            document.getElementById('def').src = `images/${team}_def.jpg`;
            document.getElementById('medi').src = `images/${team}_medi.jpg`;
            document.getElementById('medd').src = `images/${team}_medd.jpg`;
            document.getElementById('del').src = `images/${team}_del.jpg`;
            for (let i = 1; i <= 6; i++) {
                document.getElementById(`s${i}`).src = `images/${team}_suplente${i}.jpg`;
            }
        }
        function openZoom(src) {
            const img = document.getElementById('imgZoom');
            img.src = src;
            document.getElementById('modal').style.display = 'flex';
        }
        window.onload = () => update('psg');
    </script>
</body>
</html>
